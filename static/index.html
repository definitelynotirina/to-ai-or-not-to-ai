<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scope</title>
  <style>
    :root {
      --bg: #0f1720;
      --panel: rgba(14, 23, 36, 0.88);
      --panel-border: rgba(148, 163, 184, 0.18);
      --text: #e5edf5;
      --muted: #93a4b8;
      --accent: #73e0a9;
      --accent-strong: #1f8f67;
      --agent: #172433;
      --user: linear-gradient(135deg, #2d7ff9, #1955c7);
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(78, 172, 255, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(115, 224, 169, 0.15), transparent 26%),
        linear-gradient(180deg, #091119 0%, #0f1720 44%, #121b26 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(960px, 100%);
      height: min(88vh, 900px);
      display: grid;
      grid-template-rows: 1fr auto;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .chat {
      overflow-y: auto;
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: min(720px, 88%);
      padding: 14px 16px;
      border-radius: 20px;
      line-height: 1.55;
      font-size: 0.97rem;
      white-space: normal;
      animation: rise 180ms ease-out;
    }

    .message.agent {
      align-self: flex-start;
      background: var(--agent);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-bottom-left-radius: 8px;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 8px;
    }

    .message.system {
      align-self: center;
      background: rgba(20, 31, 45, 0.88);
      color: var(--muted);
      border: 1px dashed rgba(148, 163, 184, 0.2);
      font-size: 0.9rem;
    }

    .message p {
      margin: 0 0 10px;
    }

    .message p:last-child {
      margin-bottom: 0;
    }

    .message ul {
      margin: 8px 0 8px 20px;
      padding: 0;
    }

    .message code {
      font-family: Consolas, monospace;
      background: rgba(255, 255, 255, 0.08);
      padding: 1px 6px;
      border-radius: 6px;
    }

    .typing {
      display: none;
      align-self: flex-start;
      background: var(--agent);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 18px;
      padding: 12px 14px;
      gap: 6px;
    }

    .typing.visible {
      display: inline-flex;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--muted);
      animation: pulse 1.1s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    .composer {
      padding: 18px 20px 20px;
      border-top: 1px solid var(--panel-border);
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 54px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(8, 13, 20, 0.55);
      color: var(--text);
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(115, 224, 169, 0.55);
      box-shadow: 0 0 0 4px rgba(115, 224, 169, 0.08);
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .send {
      background: var(--accent);
      color: #082114;
    }

    .end {
      background: rgba(148, 163, 184, 0.16);
      color: var(--text);
    }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    @keyframes rise {
      from { transform: translateY(8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 720px) {
      body {
        padding: 0;
      }

      .shell {
        width: 100%;
        height: 100vh;
        border-radius: 0;
      }

      .composer {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="chat" id="chat" aria-live="polite">
      <div class="typing" id="typing" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
    </section>

    <form class="composer" id="composer">
      <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
      <button class="send" id="sendButton" type="submit">Send</button>
      <button class="end" id="endButton" type="button">End Chat</button>
    </form>
  </main>

  <script>
    const chat = document.getElementById("chat");
    const typing = document.getElementById("typing");
    const input = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const endButton = document.getElementById("endButton");
    const composer = document.getElementById("composer");

    let sessionId = null;
    let ended = false;

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderMarkdown(text) {
      const escaped = escapeHtml(text).replace(/\r\n/g, "\n");
      const lines = escaped.split("\n");
      const blocks = [];
      let listItems = [];

      function flushList() {
        if (listItems.length) {
          blocks.push(`<ul>${listItems.map(item => `<li>${item}</li>`).join("")}</ul>`);
          listItems = [];
        }
      }

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) {
          flushList();
          continue;
        }

        if (/^[-*]\s+/.test(trimmed)) {
          listItems.push(formatInline(trimmed.replace(/^[-*]\s+/, "")));
          continue;
        }

        flushList();
        blocks.push(`<p>${formatInline(trimmed)}</p>`);
      }

      flushList();
      return blocks.join("");
    }

    function formatInline(text) {
      return text
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/`([^`]+)`/g, "<code>$1</code>");
    }

    function addMessage(role, text) {
      const el = document.createElement("article");
      el.className = `message ${role}`;
      el.innerHTML = renderMarkdown(text);
      chat.insertBefore(el, typing);
      chat.scrollTop = chat.scrollHeight;
    }

    function setTyping(visible) {
      typing.classList.toggle("visible", visible);
      chat.scrollTop = chat.scrollHeight;
    }

    function setBusy(busy) {
      input.disabled = busy || ended;
      sendButton.disabled = busy || ended;
      endButton.disabled = busy || ended;
      setTyping(busy);
    }

    async function startSession() {
      setBusy(true);
      try {
        const response = await fetch("/api/session/start", {
          method: "POST"
        });
        const data = await response.json();
        sessionId = data.session_id;
        addMessage("agent", data.message);
      } catch (error) {
        addMessage("system", "Could not connect to the backend.");
      } finally {
        setBusy(false);
        input.focus();
      }
    }

    async function sendMessage(message) {
      if (!sessionId || ended) return;

      addMessage("user", message);
      input.value = "";
      setBusy(true);

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message })
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "Request failed");
        }

        if (data.memory_status) {
          addMessage("system", data.memory_status);
        }

        addMessage("agent", data.message);

        if (data.ended) {
          ended = true;
        }
      } catch (error) {
        addMessage("system", error.message || "Something went wrong.");
      } finally {
        setBusy(false);
        if (!ended) input.focus();
      }
    }

    async function endSession() {
      if (!sessionId || ended) return;

      setBusy(true);
      try {
        const response = await fetch("/api/session/end", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId })
        });
        const data = await response.json();
        addMessage("system", data.message);
        ended = true;
      } catch (error) {
        addMessage("system", "Could not end the conversation cleanly.");
      } finally {
        setBusy(false);
      }
    }

    composer.addEventListener("submit", async (event) => {
      event.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      await sendMessage(message);
    });

    endButton.addEventListener("click", endSession);

    input.addEventListener("keydown", async (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        await sendMessage(message);
      }
    });

    startSession();
  </script>
</body>
</html>
